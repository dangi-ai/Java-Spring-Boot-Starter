spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

aws:
  secretsmanager:
    secret-name: ${AWS_SECRET_NAME:prod/technoboost/db}
    region: ${AWS_REGION:ap-south-1}

  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1800000

server:
  error:
    include-message: never
    include-stacktrace: never
